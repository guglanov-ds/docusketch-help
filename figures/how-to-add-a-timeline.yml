# Faithful reproduction of help.docusketch.com/docs/how-to-add-a-timeline:
# same 7 images, same frame grouping (3-3-3-2-3-3-1), fresh screenshots, CLEAN
# (no highlight boxes / arrows / captions / badges).
# Chrome: real native iOS 26 status bar on every frame + the real Projects-tab tab bar on
# app-screen frames, both captured from the running app (tools/crop-chrome.py). The native
# nav bar is already part of each screenshot-test baseline.
defaults:
  frame_height: 1180
  gap: 110
  bg: "#F9F9F5"  # --bg-neutral-light (design system)
  status_bar: true

composites:
  - out: how-to-add-a-timeline/01-add-timeline.png
    arrows: false
    badges: false
    frames:
      - {img: raw/project-list.png, tabbar: projects}
      - {img: raw/project-actions-uploaded.png}
      - {img: raw/create-timeline-empty.png, tabbar: projects}

  - out: how-to-add-a-timeline/02-view-360.png
    arrows: false
    badges: false
    frames:
      - {img: raw/timeline-room-list.png, tabbar: projects}
      - {img: raw/viewer-360-close.png}
      - {img: raw/timeline-room-list.png, tabbar: projects}

  - out: how-to-add-a-timeline/03-take-360.png
    arrows: false
    badges: false
    frames:
      - {img: raw/timeline-room-list.png, tabbar: projects}
      - {img: raw/shoot-360.png}
      - {img: raw/timeline-room-list.png, tabbar: projects}

  - out: how-to-add-a-timeline/04-room-menu.png
    arrows: false
    badges: false
    frames:
      - {img: raw/timeline-room-list.png, tabbar: projects}
      - {img: raw/timeline-room-actions.png}

  - out: how-to-add-a-timeline/05-done.png
    arrows: false
    badges: false
    frames:
      - {img: raw/timeline-room-all-captured.png, tabbar: projects}
      - {img: raw/room-list.png, tabbar: projects}
      - {img: raw/project-list-timelines.png, tabbar: projects}

  - out: how-to-add-a-timeline/06-upload.png
    arrows: false
    badges: false
    frames:
      - {img: raw/project-list.png, tabbar: projects}
      - {img: raw/project-actions-local.png}
      - {img: raw/upload-progress.png}

  - out: how-to-add-a-timeline/07-parent-warning.png
    arrows: false
    badges: false
    frames:
      - {img: raw/upload-alert.png}
